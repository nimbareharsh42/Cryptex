{% extends 'file_sharing/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="dashboard-card card p-4 text-center">
            <div class="mb-4">
                <i class="fas fa-sign-out-alt fa-4x text-primary"></i>
            </div>
            <h3 class="mb-3">You have been logged out</h3>
            <p class="text-muted mb-4">Thank you for using SecureShare. Your files are safely encrypted and stored.</p>
            <div class="d-grid">
                <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
                    <i class="fas fa-sign-in-alt me-2"></i>Log in again
                </a>
            </div>
            <hr class="my-4">
            <p class="text-muted">
                <small>
                    <i class="fas fa-shield-alt me-1"></i>
                    Secure file sharing with end-to-end encryption
                </small>
            </p>
        </div>
    </div>
</div>
{% endblock %}
