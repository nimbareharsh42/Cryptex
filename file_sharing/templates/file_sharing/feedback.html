{% extends 'file_sharing/base.html' %}

{% block title %}Feedback - Cryptex{% endblock %}

{% block content %}
<style>
    /* Reuse shared styling */
    .feedback-page {
        margin: -1.5rem -15px 0 -15px;
        background: linear-gradient(to bottom, #f8f9fa 0%, #e9ecef 100%);
        min-height: calc(100vh - 200px);
        padding: 2rem 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    @media (min-width: 768px) {
        .feedback-page {
            margin: -1.5rem calc(-50vw + 50%) 0 calc(-50vw + 50%);
        }
    }

    .feedback-card {
        background: white;
        border-radius: 24px;
        padding: 3rem;
        width: 100%;
        max-width: 550px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.8);
        text-align: center;
    }

    .icon-wrapper {
        width: 70px;
        height: 70px;
        background: linear-gradient(135deg, #fceb9a 0%, #fcd34d 100%);
        color: #92400e;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        margin: 0 auto 1.5rem;
    }

    .form-control {
        border-radius: 12px;
        padding: 1rem;
        border: 2px solid #e2e8f0;
        resize: none;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: #fcd34d;
        box-shadow: 0 0 0 4px rgba(252, 211, 77, 0.2);
    }

    .btn-submit {
        background: black;
        color: white;
        border: none;
        padding: 1rem;
        border-radius: 12px;
        font-weight: 700;
        width: 100%;
        margin-top: 1.5rem;
        transition: all 0.3s ease;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
</style>

<div class="feedback-page">
    <div class="feedback-card">
        <div class="icon-wrapper">
            <i class="fas fa-lightbulb"></i>
        </div>
        <h2 class="mb-2 fw-bold">We Value Your Input</h2>
        <p class="text-muted mb-4">Help us improve Cryptex. Share your thoughts, report bugs, or suggest new features.
        </p>

        <form method="post" action="{% url 'submit_feedback' %}">
            {% csrf_token %}
            <div class="text-start">
                <label class="fw-bold mb-2 ps-1">Your Message</label>
                <textarea name="feedback" class="form-control" rows="5" placeholder="Tell us what you think..."
                    required></textarea>
            </div>

            <button type="submit" class="btn-submit">
                Submit Feedback
            </button>
        </form>
    </div>
</div>
{% endblock %}
