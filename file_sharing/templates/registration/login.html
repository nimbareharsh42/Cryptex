{% extends 'file_sharing/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="dashboard-card card p-4">
            <h3 class="text-center mb-4">Secure File Sharing</h3>
            
            {% if form.errors %}
            <div class="alert alert-danger">
                Your username and password didn't match. Please try again.
            </div>
            {% endif %}
            
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_username" class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" id="id_username" required autofocus>
                </div>
                
                <div class="mb-4">
                    <label for="id_password" class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" id="id_password" required>
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
                </div>
                
                <input type="hidden" name="next" value="{{ next }}">
            </form>
            
            <div class="d-flex align-items-center my-4">
                <hr class="flex-grow-1 m-0">
                <span class="mx-3 text-muted">or continue with</span>
                <hr class="flex-grow-1 m-0">
            </div>
            
            <div class="d-grid mb-4">
                <button onclick="loginWithGoogle()" class="btn btn-light btn-lg border d-flex align-items-center justify-content-center gap-2" style="background-color: white; font-weight: 500;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo" style="width: 20px; height: 20px;">
                    Sign in with Google
                </button>
            </div>
            
            <hr class="mb-4 mt-0">
            
            <p class="text-center text-muted">
                <small>
                    <i class="fas fa-shield-alt me-1"></i>
                    Your password is used to decrypt your private key for secure file access.
                </small>
            </p>
        </div>
    </div>
</div>

<script>
async function loginWithGoogle() {
  const { error} = await supabaseClient.auth.signInWithOAuth({
    provider: 'google'
  })
  if (error) console.log(error)
}
</script>
{% endblock %}
