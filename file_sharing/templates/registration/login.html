{% extends 'file_sharing/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="dashboard-card card p-4">
            <h3 class="text-center mb-4">Secure File Sharing</h3>
            
            {% if form.errors %}
            <div class="alert alert-danger">
                Your username and password didn't match. Please try again.
            </div>
            {% endif %}
            
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_username" class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" id="id_username" required autofocus>
                </div>
                
                <div class="mb-4">
                    <label for="id_password" class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" id="id_password" required>
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
                </div>
                
                <input type="hidden" name="next" value="{{ next }}">
            </form>
            
            <hr class="my-4">
            
            <p class="text-center text-muted">
                <small>
                    <i class="fas fa-shield-alt me-1"></i>
                    Your password is used to decrypt your private key for secure file access.
                </small>
            </p>
        </div>
    </div>
</div>
{% endblock %}
